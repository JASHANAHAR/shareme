<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalDrop P2P</title>

    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Load React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Load Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Load Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="bg-slate-900 text-white font-sans selection:bg-blue-500/30">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [role, setRole] = useState(null);
            const [step, setStep] = useState(0);
            const [localCode, setLocalCode] = useState('');
            const [remoteCodeInput, setRemoteCodeInput] = useState('');
            const [copied, setCopied] = useState(false);
            const [status, setStatus] = useState('Disconnected');
            const [progress, setProgress] = useState(0);
            const [transferStats, setTransferStats] = useState(null);

            const pc = useRef(null);
            const dc = useRef(null);
            const fileReader = useRef(null);
            const receiveBuffer = useRef([]);
            const receivedSize = useRef(0);
            const fileMeta = useRef(null);

            const initWebRTC = () => {
                const configuration = {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' }
                    ]
                };
                const connection = new RTCPeerConnection(configuration);

                connection.oniceconnectionstatechange = () => {
                    setStatus(`ICE State: ${connection.iceConnectionState}`);
                    if (connection.iceConnectionState === 'connected' || connection.iceConnectionState === 'completed') {
                        setStep(3);
                        setStatus('Connected via Local Wi-Fi Direct');
                    }
                };

                return connection;
            };

            const startSender = async () => {
                setRole('sender');
                setStep(1);
                setStatus('Generating Invite Code...');

                pc.current = initWebRTC();

                dc.current = pc.current.createDataChannel('fileTransfer');
                dc.current.binaryType = 'arraybuffer';
                setupDataChannel(dc.current);

                pc.current.onicegatheringstatechange = () => {
                    if (pc.current.iceGatheringState === 'complete') {
                        const token = btoa(JSON.stringify(pc.current.localDescription));
                        setLocalCode(token);
                        setStatus('Waiting for Receiver to accept...');
                    }
                };

                const offer = await pc.current.createOffer();
                await pc.current.setLocalDescription(offer);
            };

            const handleReceiverJoin = async () => {
                try {
                    setRole('receiver');
                    setStep(1);
                    setStatus('Processing Invite Code...');

                    pc.current = initWebRTC();

                    pc.current.ondatachannel = (event) => {
                        dc.current = event.channel;
                        dc.current.binaryType = 'arraybuffer';
                        setupDataChannel(dc.current);
                    };

                    pc.current.onicegatheringstatechange = () => {
                        if (pc.current.iceGatheringState === 'complete') {
                            const token = btoa(JSON.stringify(pc.current.localDescription));
                            setLocalCode(token);
                            setStep(2);
                            setStatus('Send this Accept Code back to the Sender');
                        }
                    };

                    const offer = JSON.parse(atob(remoteCodeInput));
                    await pc.current.setRemoteDescription(new RTCSessionDescription(offer));

                    const answer = await pc.current.createAnswer();
                    await pc.current.setLocalDescription(answer);
                } catch (e) {
                    alert("Invalid Invite Code. Please check and try again.");
                    setStep(0);
                    setRole(null);
                }
            };

            const handleSenderConfirm = async () => {
                try {
                    const answer = JSON.parse(atob(remoteCodeInput));
                    await pc.current.setRemoteDescription(new RTCSessionDescription(answer));
                    setStatus('Connecting direct tunnel...');
                } catch (e) {
                    alert("Invalid Accept Code. Please check and try again.");
                }
            };

            const setupDataChannel = (channel) => {
                channel.onopen = () => setStatus('Connected! Ready to transfer.');
                channel.onclose = () => setStatus('Connection closed.');
                channel.onerror = (err) => console.error("DataChannel error:", err);

                channel.onmessage = (e) => {
                    if (typeof e.data === 'string') {
                        const msg = JSON.parse(e.data);
                        if (msg.type === 'meta') {
                            fileMeta.current = msg;
                            receiveBuffer.current = [];
                            receivedSize.current = 0;
                            setProgress(0);
                            setTransferStats(`Receiving: ${msg.name}`);
                        } else if (msg.type === 'end') {
                            const blob = new Blob(receiveBuffer.current, { type: fileMeta.current.mime });
                            const url = URL.createObjectURL(blob);

                            const a = document.createElement('a');
                            a.href = url;
                            a.download = fileMeta.current.name;
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);

                            setTransferStats(`Completed: ${fileMeta.current.name}`);
                            setTimeout(() => setProgress(0), 2000);
                        }
                    } else {
                        receiveBuffer.current.push(e.data);
                        receivedSize.current += e.data.byteLength;
                        const currentProgress = (receivedSize.current / fileMeta.current.size) * 100;
                        setProgress(currentProgress);
                    }
                };
            };

            const sendFile = (file) => {
                if (!dc.current || dc.current.readyState !== 'open') {
                    alert('Connection is not ready.');
                    return;
                }

                const chunkSize = 16384;
                let offset = 0;
                fileReader.current = new FileReader();

                dc.current.send(JSON.stringify({
                    type: 'meta',
                    name: file.name,
                    size: file.size,
                    mime: file.type
                }));

                setTransferStats(`Sending: ${file.name}`);
                dc.current.bufferedAmountLowThreshold = 65536;

                const readNextChunk = () => {
                    const slice = file.slice(offset, offset + chunkSize);
                    fileReader.current.readAsArrayBuffer(slice);
                };

                fileReader.current.onload = (e) => {
                    if (dc.current.bufferedAmount > 1024 * 1024 * 2) {
                        dc.current.onbufferedamountlow = () => {
                            dc.current.onbufferedamountlow = null;
                            sendData(e.target.result);
                        };
                    } else {
                        sendData(e.target.result);
                    }
                };

                const sendData = (data) => {
                    try {
                        dc.current.send(data);
                        offset += data.byteLength;
                        setProgress((offset / file.size) * 100);

                        if (offset < file.size) {
                            readNextChunk();
                        } else {
                            dc.current.send(JSON.stringify({ type: 'end' }));
                            setTransferStats(`Sent successfully: ${file.name}`);
                            setTimeout(() => setProgress(0), 2000);
                        }
                    } catch (err) {
                        console.error("Transfer error", err);
                        setTransferStats("Transfer failed. Refresh and try again.");
                    }
                };

                readNextChunk();
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file) sendFile(file);
            };

            const copyToClipboard = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                } catch (err) {
                    console.error('Copy failed', err);
                }
                document.body.removeChild(textArea);

                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const reset = () => {
                if (pc.current) pc.current.close();
                setRole(null);
                setStep(0);
                setLocalCode('');
                setRemoteCodeInput('');
                setStatus('Disconnected');
                setProgress(0);
                setTransferStats(null);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center justify-center">

                    <div className="max-w-2xl w-full text-center mb-8">
                        <div className="inline-flex items-center justify-center p-3 bg-blue-600/20 rounded-full mb-4">
                            <i className="ph ph-share-network text-3xl text-blue-400"></i>
                        </div>
                        <h1 className="text-3xl font-bold mb-2">LocalDrop P2P</h1>
                        <p className="text-slate-400">Serverless, offline Wi-Fi Direct file transfer for heavy files.</p>

                        {status !== 'Disconnected' && (
                            <div className="mt-4 inline-flex items-center gap-2 px-3 py-1 rounded-full bg-slate-800 border border-slate-700 text-sm">
                                <div className={`w-2 h-2 rounded-full ${status.includes('Connected') ? 'bg-green-500' : 'bg-yellow-500 animate-pulse'}`}></div>
                                {status}
                            </div>
                        )}
                    </div>

                    <div className="max-w-md w-full bg-slate-800 rounded-2xl shadow-xl border border-slate-700 overflow-hidden relative">

                        {progress > 0 && (
                            <div className="absolute top-0 left-0 h-1 bg-blue-500 transition-all duration-300 ease-out z-10" style={{ width: `${progress}%` }}></div>
                        )}

                        <div className="p-6">
                            {step === 0 && (
                                <div className="space-y-4">
                                    <div className="bg-slate-700/50 p-4 rounded-xl mb-6 text-sm text-slate-300 flex items-start gap-3 border border-slate-600/50">
                                        <i className="ph ph-wifi-high text-xl text-blue-400 shrink-0 mt-0.5"></i>
                                        <p>Works over Local Wi-Fi, Mobile Hotspot, or Mobile Data (like Jio/Airtel) using STUN routing.</p>
                                    </div>

                                    <button
                                        onClick={startSender}
                                        className="w-full flex items-center justify-between p-4 rounded-xl bg-blue-600 hover:bg-blue-500 transition-colors group"
                                    >
                                        <div className="flex items-center gap-3">
                                            <i className="ph ph-upload-simple text-xl"></i>
                                            <div className="text-left">
                                                <div className="font-semibold">Send Files</div>
                                                <div className="text-blue-200 text-xs">Create a connection to send</div>
                                            </div>
                                        </div>
                                        <i className="ph ph-arrow-right text-xl opacity-50 group-hover:opacity-100 group-hover:translate-x-1 transition-all"></i>
                                    </button>

                                    <button
                                        onClick={() => { setRole('receiver'); setStep(0.5); }}
                                        className="w-full flex items-center justify-between p-4 rounded-xl bg-slate-700 hover:bg-slate-600 transition-colors group"
                                    >
                                        <div className="flex items-center gap-3">
                                            <i className="ph ph-download-simple text-xl"></i>
                                            <div className="text-left">
                                                <div className="font-semibold">Receive Files</div>
                                                <div className="text-slate-300 text-xs">Join an existing connection</div>
                                            </div>
                                        </div>
                                        <i className="ph ph-arrow-right text-xl opacity-50 group-hover:opacity-100 group-hover:translate-x-1 transition-all"></i>
                                    </button>
                                </div>
                            )}

                            {role === 'receiver' && step === 0.5 && (
                                <div className="space-y-4">
                                    <h3 className="font-semibold text-lg">Enter Invite Code</h3>
                                    <p className="text-sm text-slate-400">Ask the sender to give you their generated code.</p>
                                    <textarea
                                        className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm font-mono h-24 focus:ring-2 focus:ring-blue-500 outline-none"
                                        placeholder="Paste code here..."
                                        value={remoteCodeInput}
                                        onChange={(e) => setRemoteCodeInput(e.target.value)}
                                    />
                                    <div className="flex gap-3">
                                        <button onClick={reset} className="flex-1 py-3 rounded-xl bg-slate-700 hover:bg-slate-600 transition-colors font-medium">Back</button>
                                        <button
                                            onClick={handleReceiverJoin}
                                            disabled={!remoteCodeInput}
                                            className="flex-1 py-3 rounded-xl bg-blue-600 hover:bg-blue-500 disabled:opacity-50 transition-colors font-medium"
                                        >
                                            Join Tunnel
                                        </button>
                                    </div>
                                </div>
                            )}

                            {role === 'sender' && step === 1 && (
                                <div className="space-y-6">
                                    <div>
                                        <h3 className="font-semibold text-lg mb-1">1. Share Invite Code</h3>
                                        <p className="text-sm text-slate-400 mb-3">Give this code to the receiver (via SMS, Notes, etc.)</p>

                                        {localCode ? (
                                            <div className="relative group">
                                                <div className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs font-mono break-all h-20 overflow-hidden text-slate-400">
                                                    {localCode}
                                                </div>
                                                <button
                                                    onClick={() => copyToClipboard(localCode)}
                                                    className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 backdrop-blur-sm transition-all flex items-center justify-center rounded-xl font-medium"
                                                >
                                                    {copied ? <span className="flex items-center gap-2 text-green-400"><i className="ph ph-check-circle text-xl"></i> Copied!</span> : <span className="flex items-center gap-2"><i className="ph ph-copy text-xl"></i> Copy Code</span>}
                                                </button>
                                            </div>
                                        ) : (
                                            <div className="h-20 flex items-center justify-center bg-slate-900 rounded-xl border border-slate-700">
                                                <i className="ph ph-spinner text-2xl animate-spin text-blue-500"></i>
                                            </div>
                                        )}
                                    </div>

                                    <div className="h-px w-full bg-slate-700"></div>

                                    <div>
                                        <h3 className="font-semibold text-lg mb-1">2. Paste Accept Code</h3>
                                        <p className="text-sm text-slate-400 mb-3">Once they join, paste their response code here.</p>
                                        <textarea
                                            className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm font-mono h-20 focus:ring-2 focus:ring-blue-500 outline-none mb-3"
                                            placeholder="Paste Accept Code..."
                                            value={remoteCodeInput}
                                            onChange={(e) => setRemoteCodeInput(e.target.value)}
                                        />
                                        <div className="flex gap-3">
                                            <button onClick={reset} className="px-4 py-3 rounded-xl bg-slate-700 hover:bg-slate-600 transition-colors font-medium">Cancel</button>
                                            <button
                                                onClick={handleSenderConfirm}
                                                disabled={!remoteCodeInput}
                                                className="flex-1 py-3 rounded-xl bg-blue-600 hover:bg-blue-500 disabled:opacity-50 transition-colors font-medium"
                                            >
                                                Connect
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {role === 'receiver' && step === 2 && (
                                <div className="space-y-6">
                                    <div>
                                        <h3 className="font-semibold text-lg mb-1">Send this back</h3>
                                        <p className="text-sm text-slate-400 mb-3">Copy this Accept Code and give it to the Sender to complete the handshake.</p>

                                        <div className="relative group mb-6">
                                            <div className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs font-mono break-all h-24 overflow-hidden text-slate-400">
                                                {localCode}
                                            </div>
                                            <button
                                                onClick={() => copyToClipboard(localCode)}
                                                className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 backdrop-blur-sm transition-all flex items-center justify-center rounded-xl font-medium"
                                            >
                                                {copied ? <span className="flex items-center gap-2 text-green-400"><i className="ph ph-check-circle text-xl"></i> Copied!</span> : <span className="flex items-center gap-2"><i className="ph ph-copy text-xl"></i> Copy Code</span>}
                                            </button>
                                        </div>

                                        <div className="flex items-center justify-center gap-3 p-4 bg-blue-500/10 border border-blue-500/30 rounded-xl text-blue-400">
                                            <i className="ph ph-spinner text-xl animate-spin"></i>
                                            <span className="text-sm font-medium">Waiting for Sender to connect...</span>
                                        </div>

                                        <button onClick={reset} className="w-full mt-4 py-3 rounded-xl bg-slate-700 hover:bg-slate-600 transition-colors font-medium">Cancel</button>
                                    </div>
                                </div>
                            )}

                            {step === 3 && (
                                <div className="space-y-6 text-center">
                                    <div className="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <i className="ph ph-device-mobile text-4xl text-green-400"></i>
                                    </div>
                                    <h3 className="text-xl font-bold">Tunnel Active</h3>
                                    <p className="text-sm text-slate-400">Devices are connected directly over the network.</p>

                                    {role === 'sender' ? (
                                        <div className="mt-6">
                                            <label className="w-full border-2 border-dashed border-slate-600 hover:border-blue-500 bg-slate-900 rounded-2xl p-8 flex flex-col items-center justify-center cursor-pointer transition-colors group">
                                                <i className="ph ph-upload-simple text-4xl text-slate-400 group-hover:text-blue-400 mb-3 transition-colors"></i>
                                                <span className="font-medium">Select a file to send</span>
                                                <span className="text-xs text-slate-500 mt-1">Movies, Photos, Zips (Any size)</span>
                                                <input type="file" className="hidden" onChange={handleFileUpload} />
                                            </label>
                                        </div>
                                    ) : (
                                        <div className="mt-6 p-8 border-2 border-dashed border-slate-600 bg-slate-900 rounded-2xl flex flex-col items-center">
                                            <i className="ph ph-download-simple text-4xl text-slate-400 mb-3 animate-bounce"></i>
                                            <span className="font-medium">Waiting for files...</span>
                                            <span className="text-xs text-slate-500 mt-1">Files will download automatically</span>
                                        </div>
                                    )}

                                    {transferStats && (
                                        <div className="bg-slate-900 border border-slate-700 rounded-xl p-4 mt-4 text-sm flex items-center gap-3 text-left">
                                            <i className="ph ph-file text-xl text-blue-400 shrink-0"></i>
                                            <div className="truncate flex-1 font-medium">{transferStats}</div>
                                            {progress > 0 && <div className="text-xs text-blue-400 font-mono">{Math.round(progress)}%</div>}
                                        </div>
                                    )}

                                    <button onClick={reset} className="mt-6 text-sm text-slate-400 hover:text-white transition-colors flex items-center justify-center gap-2 mx-auto">
                                        <i className="ph ph-x text-base"></i> End Session
                                    </button>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
